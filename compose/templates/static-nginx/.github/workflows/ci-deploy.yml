name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Build and restart container
        run: |
          # TEMPLATE: replace SERVICE_NAME with your actual service name
          docker compose build --no-cache
          docker compose up -d --no-deps SERVICE_NAME

      - name: Health check
        run: |
          sleep 3
          # TEMPLATE: replace /SERVICE_NAME/ with your actual path
          curl -sf https://mitchellnet.local/SERVICE_NAME/ || \
            (docker compose logs SERVICE_NAME --tail=50 && exit 1)
